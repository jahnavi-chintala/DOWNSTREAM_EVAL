        score: 100
        match: "Verbatim"
        yes_no: true
        usdm: "resolved"
        conf: "resolved"
        gsop: "CT40"
      - text: "Participant took prohibited medication that could potentially impact efficacy assessments"
        score: 95
        match: "Semantic"
        yes_no: true
        usdm: "resolved"
        conf: "review"
        gsop: "—"
    near_misses:
      - generated: "Participant met all eligibility criteria but was randomised prior to assessment of all eligibility criteria."
        gt: "Participant met all eligibility criteria but was randomized prior to assessment of all eligibility criteria."
        cosine: 0.87
    misses: []

  - id: 10
    name: "Other"
    weight: 0.12
    score: 72.0
