# PIPD Eval Report input (YAML or JSON with this schema).
# Run: python generate_pipd_report.py eval_data.yml
#
# All user-facing prose should live here (or in your emitted JSON), not in the Python
# template. Optional ``template`` keys override generic defaults; per-category notes
# override template.none_identified_note for that category only.

# Scenario 1 report layout matches the eval pipeline (see pipd_eval_report_reference.py);
# canonical Word outline name: reference_spec/PIPD_Eval_Report_B7981027.docx (not "reference report.docx").
# Weights / category definitions for scoring: reference_spec/pipd_eval_config.yaml (reference.yaml mirrors config).

template:
  none_identified_note: >
    None identified — both generator and ground truth set none_identified for this category.
    Full credit per scoring config (reference.yaml → none_identified.both_true_score).
  empty_subcats_label: "Empty ✓"
  see_detail_pointer: "see Section 3"
  scorecard_chart_caption: "Category scores (weighted contribution)"
  section_actions_intro: "Actions derived from eval scoring. Prioritised for generator developer."
  near_miss_line_prefix: "NEAR MISS (semantic):"
  miss_line_prefix: "MISS:"
  out_of_scope_intro: "Out of scope — not penalised"

