  study_id: "B7981027"
  study_name: "Ritlecitinib (PF-06651600) Phase 3 Alopecia Areata"
  eval_date: "2026-04-05"
  generator_version: "v4.0"
  config: "1.0"
  study_type: "I&I / Ph III — ii_phase3"

