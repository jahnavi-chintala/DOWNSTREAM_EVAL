    misses: []

improvement_actions:
  - priority: "HIGH"
    category: "Cat 10"
    type: "miss"
    action: "WISC-V and related assessment subcategories: consolidate extraction from StudyDesign / assessment-specific USDM entities; validate against extract_cat10() coverage."
    fix_location: "usdm_extractor.py → extract_cat10()"
  - priority: "MEDIUM"
    category: "Cat 10"
    type: "extra"
    action: "Tighten post-validation to reduce Extra rows where USDM yields ambiguous hits."
    fix_location: "post_gen_validation.py"
  - priority: "LOW"
    category: "Cat 1"
    type: "near_miss"
    action: "Normalize British/US spelling in eligibility strings for verbatim Tier-1 matching."
    fix_location: "normalization_utils.py"

out_of_scope:
  count: 7
  reason: "IT Systems rows — not predictable from protocol text"
  detail: "Generator is not expected to predict these from protocol text."

footer:
  source: "eval_data.yml"
  source_json: "pipd_eval_B7981027.json"
