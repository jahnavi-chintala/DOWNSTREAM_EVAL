openapi: 3.1.0
info:
  title: D1 Risk Profile Eval API
  description: Quality evaluation service for the D1 Risk Profile Generator (Pfizer DDF Hackathon)
  version: 1.0.0
paths:
  /health:
    get:
      summary: Health Check
      description: "Liveness probe.\n\nReturns HTTP 200 immediately with status 'ok'. Used by Kubernetes liveness\nchecks\
        \ to confirm the container process is alive. Never returns 5xx unless\nthe Python process itself has crashed.\n\n\
        Returns:\n    JSON: {status, service, version}"
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Check Health Get
  /health/ready:
    get:
      summary: Readiness Check
      description: "Readiness probe.\n\nChecks that the GROUND_TRUTH_RISKS and GROUND_TRUTH_FACTORS environment\nvariables\
        \ are set and that the files they point to exist on disk.\nReturns HTTP 200 if ready, HTTP 503 if not.\n\nUsed by\
        \ Kubernetes readiness checks to gate traffic before required files\nare mounted / available.\n\nReturns:\n    JSON:\
        \ {status, checks: {env_vars, file_access}}"
      operationId: readiness_check_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Readiness Check Health Ready Get
  /eval/detect:
    post:
      summary: Detect Eval Scenario
      description: "Auto-detect which evaluation scenario would run for a given study_id.\n\nDoes NOT run the evaluation —\
        \ only returns which scenario would be used.\nUseful for the orchestrator to pre-check routing before submitting a\
        \ full\neval request.\n\nArgs:\n    req.study_id: Study identifier to check\n    req.ground_truth_risks: Path to ground\
        \ truth CSV (uses env var if not supplied)\n\nReturns:\n    JSON: {study_id, scenario (1 or 2), reason}"
      operationId: detect_eval_scenario_eval_detect_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Detect Eval Scenario Eval Detect Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /eval/scenario1:
    post:
      summary: Eval Scenario1
      description: "Run Scenario 1 evaluation for a single study (ground truth required).\n\nValidates all file paths, runs\
        \ all 4 metrics (M1 Risk Name Recall, M2 RPN Tier\nAccuracy, M3 Critical Factor Match, M4 Hallucination Detection),\
        \ saves output\nfiles, caches the result, and returns an EvalResponse envelope.\n\nArgs:\n    req: Scenario1Request\
        \ body\n\nReturns:\n    EvalResponse with full Scenario 1 result payload.\n\nRaises:\n    HTTP 404 if generator JSON\
        \ or ground truth CSVs not found\n    HTTP 422 on Pydantic validation errors"
      operationId: eval_scenario1_eval_scenario1_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Scenario1Request'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /eval/scenario2:
    post:
      summary: Eval Scenario2
      description: "Run Scenario 2 evaluation for a single study (no ground truth).\n\nRuns all 7 proxy signals (S1 Hallucination,\
        \ S2 Confidence, S3 Risk Count,\nS4 USDM Traceability, S5 Critical Factors, S6 Placeholder IDs, S7 RPN Formula).\n\
        Returns an overall GREEN/AMBER/RED verdict.\n\nArgs:\n    req: Scenario2Request body\n\nReturns:\n    EvalResponse\
        \ with full Scenario 2 result payload including review_list.\n\nRaises:\n    HTTP 404 if generator JSON not found"
      operationId: eval_scenario2_eval_scenario2_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Scenario2Request'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /eval/run:
    post:
      summary: Eval Run
      description: "Unified eval endpoint — auto-detects scenario and runs the appropriate module.\n\nThis is the recommended\
        \ endpoint for the orchestrator. It auto-detects whether\nthe study_id is in the ground truth CSV (Scenario 1) or\
        \ not (Scenario 2) and\nroutes accordingly. Returns the same EvalResponse structure regardless of scenario.\n\nArgs:\n\
        \    req: UnifiedEvalRequest body (all fields optional except generator_json + study_id)\n\nReturns:\n    EvalResponse\
        \ JSON — structure matches the detected scenario."
      operationId: eval_run_eval_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedEvalRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /eval/batch:
    post:
      summary: Eval Batch
      description: "Run the full batch evaluation over all 8 verify studies.\n\nRuns synchronously and returns when all studies\
        \ are complete. For the 8-study\nverify set, runtime is under 60 seconds (design spec target). Results for each\n\
        study are also cached individually in _result_cache.\n\nArgs:\n    req: BatchRequest body\n\nReturns:\n    JSON with\
        \ aggregate summary and paths to all output files.\n\nRaises:\n    HTTP 404 if generator_output_dir or ground truth\
        \ CSVs not found"
      operationId: eval_batch_eval_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Eval Batch Eval Batch Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{study_id}:
    get:
      summary: Get Results
      description: "Return the full cached eval result for a study.\n\nResults are stored in the in-memory _result_cache keyed\
        \ by study_id.\nFor production with multiple uvicorn workers, replace _result_cache with Redis\nso all workers share\
        \ the same cache.\n\nArgs:\n    study_id: Study identifier (path parameter)\n\nReturns:\n    Full result dict as JSON.\n\
        \nRaises:\n    HTTP 404 if study_id not cached (run /eval/run first)"
      operationId: get_results_results__study_id__get
      parameters:
      - name: study_id
        in: path
        required: true
        schema:
          type: string
          title: Study Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Results Results  Study Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      summary: Clear Results
      description: "Remove a study's cached result from memory.\n\nUsed by test harnesses and between batch runs to prevent\
        \ stale data from a\nprevious eval run affecting subsequent results. Safe to call even if the study\nis not cached\
        \ (returns HTTP 404 in that case).\n\nArgs:\n    study_id: Study identifier (path parameter)\n\nReturns:\n    JSON:\
        \ {study_id, cleared: true}"
      operationId: clear_results_results__study_id__delete
      parameters:
      - name: study_id
        in: path
        required: true
        schema:
          type: string
          title: Study Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Clear Results Results  Study Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{study_id}/scorecard:
    get:
      summary: Get Scorecard
      description: "Return a compact scorecard for a study.\n\nReturns verdict + per-metric pass/fail + individual scores\
        \ without the full\nresult payload. Designed for dashboard widgets and quick status checks.\n\nFor Scenario 1: returns\
        \ M1–M4 scores and targets.\nFor Scenario 2: returns S1–S7 signal statuses.\n\nArgs:\n    study_id: Study identifier\
        \ (path parameter)\n\nReturns:\n    JSON: {study_id, verdict, scenario, metrics or signals}"
      operationId: get_scorecard_results__study_id__scorecard_get
      parameters:
      - name: study_id
        in: path
        required: true
        schema:
          type: string
          title: Study Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Scorecard Results  Study Id  Scorecard Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{study_id}/failures:
    get:
      summary: Get Failures
      description: "Return the failure list for a study.\n\nFor Scenario 1: returns the classify_failures() output — structured\
        \ failure\nentries with severity, actual vs target, root cause, and recommended fix.\nUsed by the reporting tool to\
        \ populate the 'Issues Found' section.\n\nFor Scenario 2: returns the FAIL and WARN signal details.\n\nArgs:\n   \
        \ study_id: Study identifier (path parameter)\n\nReturns:\n    JSON: {study_id, scenario, failures: []}"
      operationId: get_failures_results__study_id__failures_get
      parameters:
      - name: study_id
        in: path
        required: true
        schema:
          type: string
          title: Study Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Failures Results  Study Id  Failures Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /results/{study_id}/review_list:
    get:
      summary: Get Review List
      description: "Return the human review queue for a study.\n\nFor Scenario 2: returns all risks with LOW rpn_confidence\
        \ that require clinical\nreviewer sign-off before submission. This list is mandatory to work through on\nMay 18 before\
        \ confirming outputs are ready.\n\nFor Scenario 1: returns an empty list (ground truth makes manual review\nunnecessary\
        \ for verify studies).\n\nArgs:\n    study_id: Study identifier (path parameter)\n\nReturns:\n    JSON: {study_id,\
        \ review_list_count, review_list: []}"
      operationId: get_review_list_results__study_id__review_list_get
      parameters:
      - name: study_id
        in: path
        required: true
        schema:
          type: string
          title: Study Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Review List Results  Study Id  Review List Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /:
    get:
      summary: Root
      description: API root – returns service info and available endpoints.
      operationId: root__get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Root  Get
components:
  schemas:
    BatchRequest:
      properties:
        generator_output_dir:
          type: string
          title: Generator Output Dir
          description: Directory containing generator JSON files
        ground_truth_risks:
          type: string
          title: Ground Truth Risks
          description: Path to risk_profile_ground_truth.csv
        ground_truth_factors:
          type: string
          title: Ground Truth Factors
          description: Path to critical_factors_ground_truth.csv
        output_dir:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Dir
          description: Output directory
      type: object
      required:
      - generator_output_dir
      - ground_truth_risks
      - ground_truth_factors
      title: BatchRequest
      description: Request model for the /eval/batch endpoint (all 8 verify studies).
    DetectRequest:
      properties:
        study_id:
          type: string
          title: Study Id
          description: Study identifier to check
        ground_truth_risks:
          anyOf:
          - type: string
          - type: 'null'
          title: Ground Truth Risks
          description: Path to ground truth risks CSV
      type: object
      required:
      - study_id
      title: DetectRequest
      description: Request model for the /eval/detect endpoint.
    EvalResponse:
      properties:
        study_id:
          type: string
          title: Study Id
        scenario:
          type: integer
          title: Scenario
        verdict:
          type: string
          title: Verdict
        timestamp:
          type: string
          title: Timestamp
        output_files:
          items:
            type: string
          type: array
          title: Output Files
          default: []
        result:
          additionalProperties: true
          type: object
          title: Result
          default: {}
      type: object
      required:
      - study_id
      - scenario
      - verdict
      - timestamp
      title: EvalResponse
      description: Standard response envelope for eval endpoints.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Scenario1Request:
      properties:
        generator_json:
          type: string
          title: Generator Json
          description: Path to {study_id}_RiskProfile.json
        study_id:
          type: string
          title: Study Id
          description: Study identifier, e.g. B7981027
        output_dir:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Dir
          description: Output directory (defaults to OUTPUT_DIR env var)
        ground_truth_risks:
          type: string
          title: Ground Truth Risks
          description: Path to risk_profile_ground_truth.csv
        ground_truth_factors:
          type: string
          title: Ground Truth Factors
          description: Path to critical_factors_ground_truth.csv
      type: object
      required:
      - generator_json
      - study_id
      - ground_truth_risks
      - ground_truth_factors
      title: Scenario1Request
      description: Request model for the /eval/scenario1 endpoint.
    Scenario2Request:
      properties:
        generator_json:
          type: string
          title: Generator Json
          description: Path to {study_id}_RiskProfile.json
        study_id:
          type: string
          title: Study Id
          description: Study identifier
        output_dir:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Dir
          description: Output directory
      type: object
      required:
      - generator_json
      - study_id
      title: Scenario2Request
      description: Request model for the /eval/scenario2 endpoint (no ground truth).
    UnifiedEvalRequest:
      properties:
        generator_json:
          type: string
          title: Generator Json
          description: Path to {study_id}_RiskProfile.json
        study_id:
          type: string
          title: Study Id
          description: Study identifier, e.g. B7981027
        output_dir:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Dir
          description: Output directory (defaults to OUTPUT_DIR env var)
        ground_truth_risks:
          anyOf:
          - type: string
          - type: 'null'
          title: Ground Truth Risks
          description: Path to ground truth risks CSV (may be None for Scenario 2)
        ground_truth_factors:
          anyOf:
          - type: string
          - type: 'null'
          title: Ground Truth Factors
          description: Path to critical factors CSV
      type: object
      required:
      - generator_json
      - study_id
      title: UnifiedEvalRequest
      description: Request model for the /eval/run endpoint (auto-detect scenario).
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
servers:
- url: http://127.0.0.1:9000/risk-profile
  description: Gateway (recommended)
