# ─────────────────────────────────────────────────────────────────────────────
# CMP Eval Configuration — cmp_eval_config.yaml
# Version: 1.0
# Date: 5 April 2026
# Project: Pfizer DDF Challenge — Protocol Intelligence Platform
#
# PURPOSE:
#   This file controls how the CMP eval script scores generator output.
#   Three sections:
#     1. attributes   — match type and weight per field (applies to ALL KRIs)
#     2. sections     — weight per CMP section within the document score
#     3. scoring      — thresholds, pass/fail targets, config
#
# HIERARCHY:
#   document_score (0-100)
#     └── section_score × section_weight
#           └── kri_score × (1 / max(generated, ground_truth))
#                 └── attribute_score × attribute_weight
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ATTRIBUTES ─────────────────────────────────────────────────────────────
# match_type options:
#   verbatim_with_semantic_fallback  — exact string = 1.0, near-miss/semantic = partial
#   exact                            — exact value on controlled vocabulary = 1.0 else 0.0
#   boolean                          — field populated and non-null = 1.0 else 0.0
#   tier                             — ordered scale, within-N-tiers = partial score
#   numeric_tolerance                — within N% of ground truth = 1.0 else scaled
#   jaccard                          — set overlap: |intersection| / |union|
#
# weights must sum to 1.0

attributes:

  kri_label:
    match_type: verbatim_with_semantic_fallback
    weight: 0.35
    description: >
      The KRI label as it appears in CluePoints. Verbatim match scores 1.0.
      Near-miss (Levenshtein 1-5) scores 0.80. Semantic similarity
      above threshold scores partial. No match scores 0.0.
    verbatim_fallback:
      levenshtein_max: 5
      levenshtein_score: 0.80
    semantic_fallback:
      high_threshold: 0.85
      high_score: 0.60
      medium_threshold: 0.70
      medium_score: 0.30
      low_score: 0.00

  moderate_threshold:
    match_type: numeric_tolerance
    weight: 0.20
    description: >
      Moderate alert threshold value (absolute % or relative score).
      Within 5% of ground truth = 1.0. Within 15% = 0.5. Beyond = 0.0.
      null threshold on Tier 3 KRI = 1.0 if ground truth also has no clear modal.
    tolerance_bands:
      exact_pct: 5
      exact_score: 1.00
      near_pct: 15
      near_score: 0.50
      beyond_score: 0.00

  high_threshold:
    match_type: numeric_tolerance
    weight: 0.15
    description: >
      High alert threshold value. Same tolerance rules as moderate_threshold.
    tolerance_bands:
      exact_pct: 5
      exact_score: 1.00
      near_pct: 15
      near_score: 0.50
      beyond_score: 0.00

  iqmp_risk_id:
    match_type: boolean
    weight: 0.15
    description: >
      Traceability gate. Score 1.0 if iqmp_risk_id is non-null AND the
      SR-XXXXX code exists in the cmp_kri_ground_truth.csv for this study TA.
      Score 0.0 if null, empty, or code not found in training data.

  confidence_tier:
    match_type: tier
    weight: 0.10
    description: >
      Confidence tier assigned by generator. Exact match = 1.0.
      Within 1 tier = 0.5. Beyond = 0.0.
    tiers:
      - 1    # Tier 1 — Auto, >= 10 source studies, tight distribution
      - 2    # Tier 2 — Review, < 10 source studies or phase fallback
      - 3    # Tier 3 — Low confidence, no YAML match
    tier_scores:
      exact_match: 1.00
      adjacent_tier: 0.50
      beyond_adjacent: 0.00

  weight_field:
    match_type: exact
    weight: 0.05
    description: >
      KRI weight — controlled vocabulary: Low | Moderate | High.
      Exact match only.
    vocabulary: [Low, Moderate, High]

# ── 2. SECTIONS ───────────────────────────────────────────────────────────────
# Weights reflect clinical importance and prediction difficulty.
# Weights must sum to 1.0.
# Global KRIs and SS KRIs are scored separately within the KRI section.

sections:

  global_kris:
    name: Global Standard KRIs
    weight: 0.35
    description: >
      Cross-TA KRIs: Protocol Deviation Rate, AE Rate, SAE Rate,
      ePRO audit trail pairs. Near-deterministic — expected high score.
    near_deterministic: true

  study_specific_kris:
    name: Study-Specific KRIs
    weight: 0.40
    description: >
      TA-driven KRIs: ePRO missed assessments (I&I), staging assessments
      (Oncology), sample tracking (Vaccines). Highest prediction value.
    near_deterministic: false

  qtls:
    name: Quality Tolerance Limits
    weight: 0.20
    description: >
      QTL name, expectation_pct, tolerance_limit_pct, sister KRI linkage.
      Scored on name match + numeric accuracy of expectation/tolerance values.

  section_metadata:
    name: Section 1 Metadata
    weight: 0.05
    description: >
      analysis_frequency, first_kri_trigger, first_dqa_trigger.
      Rule-based — near-deterministic.
    near_deterministic: true

# ── 3. SCORING ────────────────────────────────────────────────────────────────

scoring:

  # Document-level pass threshold
  document_pass_threshold: 75       # score out of 100
  document_target: 80               # aspirational target

  # Per-metric pass thresholds
  metric_targets:
    m1_kri_recall:            0.80  # B7981027 primary target
    m1_aggregate_recall:      0.75  # across 8 verify studies
    m2_threshold_accuracy:    0.90  # within 5% of ground truth modal
    m3_qtl_recall:            0.85  # QTL name match rate
    m4_hallucination:         0.00  # zero tolerance — null IQMP Risk IDs = fail
    m5_forms_variables:       0.95  # variable RefNames vs ASB (supplemental)
    m6_data_sources:          0.90  # Section 2 vendor names vs SDS (supplemental)

  # Semantic similarity settings (for kri_label matching)
  semantic:
    enable: true
    model: sentence-transformers/all-MiniLM-L6-v2
    batch_size: 64
    cache_embeddings: true

  # KRI scoring — how to handle misses and hallucinations
  kri_scoring:
    denominator: max_of_generated_and_ground_truth
    # penalises both misses AND hallucinated KRIs
    miss_score: 0.00
    hallucination_score: 0.00

  # QTL numeric scoring
  qtl_numeric_scoring:
    expectation_tolerance_pct: 3    # expectation_pct within 3pp = pass
    tolerance_limit_tolerance_pct: 5  # tolerance_limit_pct within 5pp = pass

  # Retired KRI handling (Vaccines long-running studies)
  retired_kri_handling:
    exclude_from_scoring: true      # active=false KRIs excluded from denominator
    flag_in_output: true

  # Out of scope — never penalised
  out_of_scope_exclusions:
    - DQA section                   # site-level anomaly flags — not benchmarked
    - Duplicate Patient Analysis    # standard template — no study variation

  # Near-miss logging threshold
  near_miss_log_threshold: 10
