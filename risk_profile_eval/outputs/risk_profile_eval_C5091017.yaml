# ─────────────────────────────────────────────────────────────────────────────
# Risk Profile Eval Configuration — risk_profile_eval_config.yaml
# Version: 1.0
# Date: 5 April 2026
# Project: Pfizer DDF Challenge — Protocol Intelligence Platform
#
# PURPOSE:
#   This file controls how the Risk Profile eval script scores generator output.
#   Three sections:
#     1. attributes   — match type and weight per field (applies to ALL risks)
#     2. risks        — weight per risk domain within the document score
#     3. scoring      — thresholds, pass/fail targets, RPN tier config
#
# HIERARCHY:
#   document_score (0-100)
#     └── risk_score × risk_weight
#           └── attribute_score × attribute_weight
#
# EVAL RUNS IN TWO SCENARIOS:
#   Scenario 1 (verify set) — ground truth available from CSVs
#   Scenario 2 (test set, May 18) — proxy quality signals only
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. ATTRIBUTES ─────────────────────────────────────────────────────────────
# match_type options:
#   verbatim_with_semantic_fallback  — exact string = 1.0, near-miss/semantic = partial
#   exact                            — exact value match on controlled vocabulary = 1.0 else 0.0
#   boolean                          — field populated and valid = 1.0 else 0.0
#   tier                             — ordered scale, within-N-tiers = partial score
#   jaccard                          — set overlap: |intersection| / |union|
#
# weights must sum to 1.0

attributes:

  risk_name_text:
    match_type: verbatim_with_semantic_fallback
    weight: 0.35
    description: >
      The risk name string. Verbatim match scores 1.0.
      Near-miss (Levenshtein 1-5) scores 0.80. Semantic similarity
      above threshold scores partial. No match scores 0.0.
      Risk names must match IRMS standard library exactly — paraphrasing
      is a generator wording failure, not an eval failure.
    verbatim_fallback:
      levenshtein_max: 5
      levenshtein_score: 0.80
    semantic_fallback:
      high_threshold: 0.90
      high_score: 0.60
      medium_threshold: 0.75
      medium_score: 0.30
      low_score: 0.00

  rpn_tier:
    match_type: tier
    weight: 0.30
    description: >
      RPN tier accuracy. Scored by comparison to ground truth RPN from
      risk_profile_ground_truth.csv. Within 1 tier = 0.5. Exact = 1.0.
      More than 1 tier away = 0.0.
      Also validates: impact x likelihood x detectability = rpn (formula check).
    tiers:
      - 112    # tier 1
      - 160    # tier 2
      - 196    # tier 3
      - 280    # tier 4
      - 400    # tier 5
    tier_scores:
      exact_match: 1.00
      adjacent_tier: 0.50
      beyond_adjacent: 0.00
    formula_check:
      enabled: true
      fail_on_mismatch: true   # arithmetic error = immediate 0 for this risk

  usdm_traceability:
    match_type: boolean
    weight: 0.20
    description: >
      Traceability gate. Score 1.0 if:
        - usdm_drivers array is non-empty
        - Every cause has a usdm_trigger object with entity + signal
        - All referenced USDM entity IDs exist in target USDM JSON
      Score 0.0 if any field has null/empty USDM source.
      This is the traceability/provenance gate.

  control_type:
    match_type: exact
    weight: 0.10
    description: >
      Control type assigned to each risk. Controlled vocabulary from IRMS:
        - Quality Tolerance Limit (QTL)
        - Stakeholder Communication Plan
        - Reference guidance for functional areas
        - Medical monitoring
      Exact match against ground truth control_types from risk_profile_ground_truth.csv.

  placeholder_ids:
    match_type: boolean
    weight: 0.05
    description: >
      Validates that all risk_ids follow SR-PLACEHOLDER-XXX format and
      all control_ids follow SCT-PLACEHOLDER-XXX format.
      Score 1.0 if all IDs are placeholders. Score 0.0 if any real IRMS
      IDs appear — generator must never fabricate SR-/SCT- IDs.

# ── 2. RISK DOMAINS ───────────────────────────────────────────────────────────
# Weights reflect clinical importance of each risk domain.
# Study Risks carry the most weight — vendor/site risks are bonus.
# Weights must sum to 1.0.

risk_domains:

  study_risks:
    name: Study Risks
    weight: 0.85
    rationale: Core risk domain — always present. Generator must select 3-6 risks.
    risk_count:
      floor: 3
      ceiling: 6
      score_penalty_outside_range: 0.50

  vendor_risks:
    name: Vendor Risks
    weight: 0.08
    rationale: Present in ~30% of training studies. Not always generated.
    none_present_score: 1.00   # full credit if both agree no vendor risks

  study_site_risks:
    name: Study Site Risks
    weight: 0.04
    rationale: Rare in training data — present in <15% of studies
    none_present_score: 1.00

  other_domain_risks:
    name: Other Domain Risks
    weight: 0.03
    rationale: Very rare — present in <10% of studies
    none_present_score: 1.00

# ── 3. SCORING ────────────────────────────────────────────────────────────────

scoring:

  config_version: "1.0"

  # Document-level pass threshold
  document_pass_threshold: 75       # score out of 100
  document_target: 80               # aspirational target

  # Per-metric pass thresholds
  metric_targets:
    m1_risk_name_recall_b7981027:   0.85  # primary target — B7981027
    m1_risk_name_recall_aggregate:  0.75  # across 8 verify studies
    m2_rpn_tier_accuracy:           0.90  # within ±1 tier of ground truth
    m3_critical_factor_match:       0.80  # correct factor names selected
    m4_hallucination:               0.00  # legacy key; zero tolerance for unresolved traceability flags

  # RPN tier definitions (for tier scoring)
  rpn_tiers:
    - 112
    - 160
    - 196
    - 280
    - 400
  rpn_tier_note: >
    Tiers are ordered. Distance = abs(tier_index_generated - tier_index_ground_truth).
    Distance 0 = 1.0, Distance 1 = 0.5, Distance >= 2 = 0.0.

  # Critical factor matching
  critical_factors:
    match_type: set_comparison        # order-independent
    denominator: ground_truth_count   # score = matched / total_gt_factors
    blank_data_handling: factor_name_only
    # For studies like C1071003 where Critical Data/Process are blank:
    # only score on factor_name selection, skip text content scoring

  # Risk count scoring
  risk_count:
    denominator: min_of_generated_and_ground_truth
    # penalises missing risks but not extra generated ones
    # extra generated risks beyond ceiling are flagged but not double-penalised
    ceiling_violation_flag: true
    floor_violation_flag: true

  # Semantic similarity settings (for risk_name near-miss analysis)
  semantic:
    enable: true
    model: sentence-transformers/all-MiniLM-L6-v2
    batch_size: 32
    cache_embeddings: true

  # Near-miss logging threshold
  near_miss_log_threshold: 10       # log all risk_name pairs with Levenshtein <= 10

  # Scenario 2 (no ground truth) — proxy quality signals
  scenario_2_signals:

    hallucination_check:
      description: Every risk must have non-empty usdm_drivers AND intelligence.benchmark_source non-null
      failure_indicator: Any risk with empty usdm_drivers — unresolved traceability
      verdict: FAIL

    rpn_confidence_distribution:
      description: Count HIGH / MEDIUM / LOW confidence per study
      failure_threshold: 0.40   # more than 40% LOW = WARN
      verdict_pass: PASS
      verdict_warn: WARN
      verdict_fail: FAIL

    risk_count_sanity:
      description: Total risks generated must be between floor=3 and ceiling=6
      floor: 3
      ceiling: 6
      verdict_outside: FAIL

    usdm_traceability_check:
      description: Every risk must have usdm_traceability = FULL in intelligence block
      failure_indicator: Any PARTIAL or NONE = WARN
      verdict_pass: PASS
      verdict_warn: WARN

    placeholder_id_check:
      description: All risk_ids must be SR-PLACEHOLDER-XXX format
      failure_indicator: Real SR- IDs appearing — generator fabricating IRMS IDs
      verdict_fail: FAIL

    rpn_formula_check:
      description: impact x likelihood x detectability must equal rpn for every risk
      failure_indicator: Arithmetic mismatch — generator calculation error
      verdict_fail: FAIL

    critical_factor_completeness:
      description: All expected factors for TA/Phase must be present in generated output
      failure_indicator: Missing factor — YAML factor_selection bucket incomplete
      verdict_warn: WARN

  # Out of scope — never penalised
  out_of_scope_exclusions:
    - general_information.risk_manager    # always blank — Pfizer fills in IRMS
    - general_information.approved_by     # always blank — Pfizer fills in IRMS
    - general_information.approval_date   # always blank — Pfizer fills in IRMS
    - risk_id                             # always placeholder — expected

  # Failure classification for reporting back to generator developer
  failure_types:
    missing_risk:
      description: Ground truth has risk that generator did not include
      root_cause: YAML occurrence_rate below selection_threshold OR wrong TA bucket
      generator_fix: Lower selection_threshold OR check TA/Phase normalisation
    hallucinated_risk:
      description: Generator produced risk not in ground truth
      root_cause: YAML occurrence_rate too permissive OR wrong bucket selected
      generator_fix: Raise selection_threshold OR fix TA/Phase bucket key
    near_miss_wording:
      description: Risk name is close but not exact to IRMS standard library name
      root_cause: Prompt not enforcing exact risk_name from YAML risk_library
      generator_fix: Add wording instruction — must use exact risk_library.name
    wrong_rpn_tier:
      description: Generated RPN is more than 1 tier from ground truth
      root_cause: typical_impact or typical_likelihood wrong in YAML benchmark
      generator_fix: Recalculate typical values from train set for that TA/Phase bucket
    missing_critical_factor:
      description: Ground truth has critical factor that generator omitted
      root_cause: factor_selection bucket incomplete for that TA/Phase
      generator_fix: Update critical_data_benchmarks.yaml factor_selection section
    hallucinated_field:
      description: Risk has field without usdm_trigger or benchmark_source
      root_cause: Generator not enforcing provenance tagging
      generator_fix: Add hard requirement — every cause must have usdm_trigger

